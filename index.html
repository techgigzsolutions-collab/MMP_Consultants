<!doctype html>
<html lang="en-AU">
  <head>
    <!-- ========================================= -->
    <!-- BASIC META -->
    <!-- ========================================= -->

    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <meta
      http-equiv="X-UA-Compatible"
      content="IE=edge"
    />

    <!-- ========================================= -->
    <!-- PRIMARY SEO -->
    <!-- ========================================= -->

    <title>
      MMP Consultants | Professional Consulting &
      Project Support Services
    </title>

    <meta
      name="description"
      content="MMP Consultants provides reliable consulting, project coordination, operational support, and professional business solutions tailored for modern businesses across Australia."

    <meta
      name="keywords"
      content="MMP Consultants, business consulting Australia, project coordination services, operational support, consulting company Australia, business solutions, consultancy services"
    />

    <meta
      name="author"
      content="MMP Consultants"
    />

    <meta
      name="publisher"
      content="MMP Consultants"
    />

    <!-- ========================================= -->
    <!-- CANONICAL -->
    <!-- ========================================= -->

    <link
      rel="canonical"
      href="https://mmpconsultants.com.au/"
    />

    <!-- ========================================= -->
    <!-- FAVICON -->
    <!-- ========================================= -->

    <link
      rel="icon"
      type="image/png"
      href="/logo-mini.png"
    />

    <link
      rel="apple-touch-icon"
      href="/logo-mini.png"
    />

    <!-- ========================================= -->
    <!-- ROBOTS -->
    <!-- ========================================= -->

    <meta
      name="robots"
      content="index, follow, max-image-preview:large"
    />

    <!-- ========================================= -->
    <!-- THEME -->
    <!-- ========================================= -->

    <meta
      name="theme-color"
      content="#1E3A5F"
    />

    <!-- ========================================= -->
    <!-- OPEN GRAPH -->
    <!-- ========================================= -->

    <meta
      property="og:type"
      content="website"
    />

    <meta
      property="og:site_name"
      content="MMP Consultants"
    />

    <meta
      property="og:title"
      content="MMP Consultants | Professional Consulting & Project Support Services"
    />

    <meta
      property="og:description"
      content="Professional consulting, project coordination, and operational support solutions tailored for modern businesses."
    />

    <meta
      property="og:url"
      content="https://mmpconsultants.com.au/"
    />

    <meta
      property="og:image"
      content="https://mmpconsultants.com.au/og-image.png"
    />

    <meta
      property="og:image:width"
      content="1200"
    />

    <meta
      property="og:image:height"
      content="630"
    />

    <meta
      property="og:locale"
      content="en_AU"
    />

    <!-- ========================================= -->
    <!-- TWITTER -->
    <!-- ========================================= -->

    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="MMP Consultants | Professional Consulting Services"
    />

    <meta
      name="twitter:description"
      content="Reliable consulting, project coordination, and operational support for modern businesses."
    />

    <meta
      name="twitter:image"
      content="https://mmpconsultants.com.au/og-image.png"
    />

    <!-- ========================================= -->
    <!-- ADDITIONAL SEO -->
    <!-- ========================================= -->

    <meta
      name="language"
      content="English"
    />

    <meta
      name="revisit-after"
      content="7 days"
    />

    <meta
      name="distribution"
      content="global"
    />

    <!-- ========================================= -->
    <!-- FONTS -->
    <!-- ========================================= -->

    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

        "email": "info@mmpconsultants.com.au",

          "addressLocality": "Tarneit",
